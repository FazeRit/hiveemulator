version: '3.9'

services:
  redis:
    image: redis:latest
    container_name: redis-main
    restart: always
    ports:
      - "6381:6379"
    networks:
      - hive-emulator-main
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: redis-commander-main
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    networks:
      - hive-emulator-main
    depends_on:
      redis:
        condition: service_healthy

  communication-control:
    image: 859384797868.dkr.ecr.us-east-1.amazonaws.com/communication-control:main
    container_name: communication-control-main
    restart: always
    environment:
      - ConnectionStrings__Redis=redis:6379,abortConnect=false
      - Redis__ConnectionString=redis:6379,abortConnect=false
      - Redis__Host=redis
      - Redis__Port=6379
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_ENVIRONMENT=Development
    networks:
      - hive-emulator-main
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy

  hive-mind:
    image: 859384797868.dkr.ecr.us-east-1.amazonaws.com/hive-mind:main
    container_name: hive-mind-main
    restart: always
    environment:
      - CommunicationControl__Url=http://communication-control:8080
    networks:
      - hive-emulator-main
    depends_on:
      - redis
      - communication-control

  web:
    image: 859384797868.dkr.ecr.us-east-1.amazonaws.com/web:main
    container_name: web-main
    ports:
      - "80:80"
    volumes:
      - ./config.json:/usr/share/nginx/html/config.json
    networks:
      - hive-emulator-main

networks:
  hive-emulator-main:
    driver: bridge