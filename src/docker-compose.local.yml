name: communication-control-project

services:
  redis:
    image: redis:alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - ./data:/data
    networks:
      - net1

  comm:
    build:
      context: ./CommunicationControl/DevOpsProject
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - Redis__ConnectionString=redis:6379
    depends_on:
      - redis
    networks:
      - net1

  hive:
    build:
      context: ./CommunicationControl/DevOpsProject.HiveMind.API
      dockerfile: Dockerfile
    ports:
      - "5149:5149"
    environment:
      - CommunicationConfiguration__CommunicationControlIP=comm
      - CommunicationConfiguration__CommunicationControlPort=8080
      - CommunicationConfiguration__RequestSchema=http
      - CommunicationConfiguration__CommunicationControlPath=api/v1/hive
      - CommunicationConfiguration__HiveIP=hive
      - CommunicationConfiguration__HivePort=5149
      - CommunicationConfiguration__HiveID=1
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - comm
    networks:
      - net1

  web:
    build: ./MapClient
    ports:
      - "80:80"
    stdin_open: true
    tty: true
    networks:
      - net1
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus-local
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - net1
  grafana:
    image: grafana/grafana:latest
    container_name: grafana-local
    ports:
      - "4000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - net1
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor-local
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - net1
  promtail:
      image: grafana/promtail:latest
      volumes:
        - ./monitoring/promtail.yml:/etc/promtail/config.yml
        - /var/run/docker.sock:/var/run/docker.sock      
        - /var/lib/docker/containers:/var/lib/docker/containers:ro
      command: -config.file=/etc/promtail/config.yml
      networks:
        - net1

networks:
  net1:
    driver: bridge
