name: Build and Deploy to EKS

on:
  push:
    branches:
      - main
      - dev

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: Publish Services
        run: |
          dotnet publish ./src/CommunicationControl/DevOpsProject/DevOpsProject.CommunicationControl.API.csproj -c Release -o ./src/CommunicationControl/DevOpsProject/published
          dotnet publish ./src/CommunicationControl/DevOpsProject.HiveMind.API/DevOpsProject.HiveMind.API.csproj -c Release -o ./src/CommunicationControl/DevOpsProject.HiveMind.API/published

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Images
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.ref_name }}
        run: |
          docker build -t $ECR_REGISTRY/communication-control:$IMAGE_TAG -f ./src/CommunicationControl/DevOpsProject/Dockerfile ./src/CommunicationControl/DevOpsProject
          docker push $ECR_REGISTRY/communication-control:$IMAGE_TAG
          
          docker build -t $ECR_REGISTRY/hive-mind:$IMAGE_TAG -f ./src/CommunicationControl/DevOpsProject.HiveMind.API/Dockerfile ./src/CommunicationControl/DevOpsProject.HiveMind.API
          docker push $ECR_REGISTRY/hive-mind:$IMAGE_TAG
          
          docker build -t $ECR_REGISTRY/web:$IMAGE_TAG ./src/MapClient
          docker push $ECR_REGISTRY/web:$IMAGE_TAG

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name hutsan-rgr --region us-east-1

      - name: Deploy to EKS
        run: |
          IMAGE_TAG=${{ github.ref_name }}
          REGISTRY=859384797868.dkr.ecr.us-east-1.amazonaws.com
          
          sed -i "s|image: .*communication-control:.*|image: $REGISTRY/communication-control:$IMAGE_TAG|g" deployment/app/communication-control/com-control.deployment.yaml
          sed -i "s|image: .*hive-mind:.*|image: $REGISTRY/hive-mind:$IMAGE_TAG|g" deployment/app/hive-mind/hive-mind.deployment.yaml
          sed -i "s|image: .*web:.*|image: $REGISTRY/web:$IMAGE_TAG|g" deployment/app/map-client/map-client.deployment.yaml
          
          kubectl apply -f deployment/infrastructure/redis/
          kubectl apply -f deployment/app/map-client/map-client.config.yaml
          kubectl apply -f deployment/app/
          kubectl apply -f deployment/infrastructure/ingress/